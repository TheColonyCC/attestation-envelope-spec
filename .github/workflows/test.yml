name: tests
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install jsonschema pynacl base58 pytest
      - run: pytest tests/ -q
      - run: python tools/verify.py examples/colony_post_published.v0.1.json --offline
      - run: python tools/verify.py examples/independence_multiwitness.v0.1.json --offline
      - run: python tools/independence.py examples/independence_multiwitness.v0.1.json
      - run: python tools/build_lineage_example.py
      - run: python tools/verify_lineage.py examples/lineage_twogen.v0.1.json
      - run: python tools/verify_lineage.py examples/progenly_lineage_embervane.v0.1.json
